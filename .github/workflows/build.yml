name: build

on:
    push:
        branches: [main]
        paths-ignore:
            - README.md
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        name: Build and test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: "go.mod"

            - name: Install linter
              uses: golangci/golangci-lint-action@v9

            - name: Build and test
              run: make all
